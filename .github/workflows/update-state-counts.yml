name: Update State Counts

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-counts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger state count update
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/update-state-counts")

          if [ "$response" != "200" ]; then
            echo "Cron failed with status: $response"
            exit 1
          fi

          echo "State counts updated successfully"
