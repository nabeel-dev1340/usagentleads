name: Generate State CSVs

on:
  schedule:
    - cron: '0 3 * * 0' # Weekly on Sunday at 3:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-csvs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Get list of state codes
        id: states
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.usagentleads.com/api/cron/generate-csvs")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" != "200" ]; then
            echo "Failed to fetch states: $body"
            exit 1
          fi

          # Extract state codes as space-separated list
          states=$(echo "$body" | jq -r '.states[]')
          echo "codes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$states" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found states: $states"

      - name: Generate CSV for each state
        run: |
          failed=0
          while IFS= read -r code; do
            [ -z "$code" ] && continue
            echo "Processing $code..."

            response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://www.usagentleads.com/api/cron/generate-csvs?state=$code")

            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)

            if [ "$http_code" = "200" ]; then
              rows=$(echo "$body" | jq -r '.rows // 0')
              echo "  ✓ $code — $rows rows"
            else
              echo "  ✗ $code — HTTP $http_code: $body"
              failed=$((failed + 1))
            fi
          done <<< "${{ steps.states.outputs.codes }}"

          if [ "$failed" -gt 0 ]; then
            echo "$failed state(s) failed"
            exit 1
          fi

          echo "All state CSVs generated successfully"

      - name: Combine into full database CSV
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.usagentleads.com/api/cron/generate-csvs?combine=true")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" != "200" ]; then
            echo "Failed to combine CSVs: $body"
            exit 1
          fi

          total=$(echo "$body" | jq -r '.totalRows // 0')
          echo "Full CSV generated — $total total rows"
